name: Regulatory Guardrails

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-guardrails:
    name: Validate PR Regulatory + Work Protocol Checklist
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR body structure and required checks
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body || "";
            const failures = [];

            const requiredSections = [
              "## Work Protocol ACK (required)",
              "## Quality Gates (QG1-QG9)",
              "## Quality Gate Justification (required)",
              "## Regulatory Profile (choose exactly one)",
              "## Mandatory Regulatory Checklist",
              "## Mandatory Architecture/Platform Checklist",
              "## Documentation Sync (choose exactly one)",
              "## Evidence and Validation",
              "## Risk and Exceptions",
            ];

            for (const section of requiredSections) {
              if (!body.includes(section)) {
                failures.push(`Missing required section: ${section}`);
              }
            }

            const ackFields = [
              "Task ID / Branch:",
              "In scope (files/modules):",
              "Out of scope (explicitly excluded):",
              "Gates aplicables (QG1..QG9):",
              "Riesgos y mitigacion:",
            ];

            for (const field of ackFields) {
              const escaped = field.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const fieldPattern = new RegExp(`${escaped}\\s*([^\\n]+)`, "i");
              const match = body.match(fieldPattern);
              const value = match?.[1]?.trim() ?? "";
              if (!value || value === "`" || /^(tbd|pending|n\/a|\.\.\.)$/i.test(value)) {
                failures.push(`Work Protocol ACK field is missing or incomplete: "${field}"`);
              }
            }

            const qualityGates = [
              "QG1 Build",
              "QG2 Tests",
              "QG3 Contracts/E2E",
              "QG4 Lint + Typecheck",
              "QG5 Security Baseline",
              "QG6 CI Smoke",
              "QG7 Review + DoD",
              "QG8 Compliance Check",
              "QG9 Nexion Parity",
            ];

            for (const gate of qualityGates) {
              const escaped = gate.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const gatePattern = new RegExp(`${escaped}[^\\n]*:\\s*` + "`?pass`?", "i");
              const match = body.match(gatePattern);
              if (!match) {
                failures.push(`Quality gate must be explicitly declared as pass: "${gate}"`);
              }
            }

            const disallowedNa = body.match(/QG[1-9][^\n]*:\s*`?n\/a`?/gi) || [];
            if (disallowedNa.length > 0) {
              failures.push("Quality gates cannot be marked as n/a. All QG1..QG9 must be pass with evidence.");
            }

            const qualityEvidenceFields = [
              "QG1 evidence:",
              "QG2 evidence:",
              "QG3 evidence:",
              "QG4 evidence:",
              "QG5 evidence:",
              "QG6 evidence:",
              "QG7 evidence:",
              "QG8 evidence:",
              "QG9 evidence:",
            ];

            for (const field of qualityEvidenceFields) {
              const escaped = field.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const fieldPattern = new RegExp(`${escaped}\\s*([^\\n]+)`, "i");
              const match = body.match(fieldPattern);
              const value = match?.[1]?.trim() ?? "";
              if (!value || /^(tbd|pending|n\/a|\.\.\.)$/i.test(value)) {
                failures.push(`Quality gate evidence is missing or incomplete: "${field}"`);
              }
            }

            const selected = (body.match(/- \[(x|X)\] `(standard|regulated|strict)`/g) || []).length;
            if (selected !== 1) {
              failures.push("Select exactly one Regulatory Profile (`standard`, `regulated`, or `strict`).");
            }

            const requiredChecks = [
              "I confirm access control changes (if any) are covered by tests, including negative authorization tests.",
              "I confirm no secrets or premium prompts are logged or persisted in plaintext.",
              "I confirm telemetry/logs are data-minimized and do not exfiltrate raw sensitive data by default.",
              "I confirm evidence/audit impact was reviewed and updated where required.",
              "I confirm no runtime mock/fake/stub placeholders were introduced; incomplete integrations fail-fast.",
              "I confirm this change follows `docs/REGULATORY_DESIGN_GUARDRAILS.md`.",
            ];

            const architectureChecks = [
              "I confirm Nexion-first reuse was applied: existing Nexion implementation was reused/adapted whenever compatible with Skuld.",
              "I confirm business services use abstraction/providers (no direct cloud coupling).",
              "I confirm multi-cloud compatibility is preserved (AWS/Azure/GCP/on-prem via providers).",
              "I confirm secrets are sourced via vault/key vault/provider and `.env` is local-only minimal non-sensitive.",
              "I confirm marketing/web does not expose direct Control Plane URLs and uses gateway-only integration.",
            ];

            function isChecked(line) {
              const escaped = line.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const checkedPattern = new RegExp(`- \\[(x|X)\\] ${escaped}`);
              return checkedPattern.test(body);
            }

            for (const line of requiredChecks) {
              if (!isChecked(line)) {
                failures.push(`Required checklist item not checked: "${line}"`);
              }
            }

            for (const line of architectureChecks) {
              if (!isChecked(line)) {
                failures.push(`Required architecture checklist item not checked: "${line}"`);
              }
            }

            const uiNotImpactedLine = "UI not impacted in this PR.";
            const uiImpactedLines = [
              "If UI is impacted: I confirm the implementation uses `shadcn/ui` + `Tailwind CSS`.",
              "If UI is impacted: I confirm Refactoring UI principles were followed end-to-end.",
              "If UI is impacted: I confirm Skuld brand rules were respected (corporate colors/tokens + official SkuldBot logo only).",
              "If UI is impacted: I confirm `Montserrat` is used as the UI typography standard.",
              "If UI is impacted: I confirm reusable patterns were componentized and existing components were reused (no duplicated UI implementation).",
              "If UI is impacted: I confirm enterprise go-to-market quality (responsive, accessibility basics, complete states, no placeholders in critical flows).",
              "If UI is impacted: I confirm user feedback/messaging uses toast components (no browser native `alert`, `confirm`, `prompt`).",
              "I confirm this change follows `docs/ENTERPRISE_UI_BRANDING_NON_NEGOTIABLES.md`.",
            ];

            const uiNotImpactedChecked = isChecked(uiNotImpactedLine);
            const uiImpactedCheckedCount = uiImpactedLines.filter((line) => isChecked(line)).length;
            const uiAllImpactedChecked = uiImpactedCheckedCount === uiImpactedLines.length;

            if (!(uiNotImpactedChecked || uiAllImpactedChecked)) {
              failures.push(
                "UI gate invalid: either mark 'UI not impacted' OR check all UI impacted checklist items."
              );
            }
            if (uiNotImpactedChecked && uiImpactedCheckedCount > 0) {
              failures.push(
                "UI gate invalid: 'UI not impacted' cannot be selected together with UI impacted checklist items."
              );
            }

            const docsDecisionChecks = [
              "Docs updated in this PR (node/platform/API behavior).",
              "Docs N/A for this PR (no behavior/contract impact).",
            ];
            let docsSelected = 0;
            for (const line of docsDecisionChecks) {
              if (isChecked(line)) {
                docsSelected += 1;
              }
            }
            if (docsSelected !== 1) {
              failures.push("Select exactly one Documentation Sync option.");
            }

            const riskMatch = body.match(/Risk level:\s*`?([a-z|]+)`?/i);
            const riskValue = riskMatch ? riskMatch[1].toLowerCase() : null;
            if (!riskValue || !["low", "medium", "high"].includes(riskValue) || riskValue.includes("|")) {
              failures.push("Risk level must be explicitly set to exactly one of: low, medium, high.");
            }

            const exceptionMatch = body.match(/Exception requested\?\s*`?([a-z|]+)`?/i);
            const exceptionValue = exceptionMatch ? exceptionMatch[1].toLowerCase() : null;
            if (!exceptionValue || !["yes", "no"].includes(exceptionValue) || exceptionValue.includes("|")) {
              failures.push("Exception requested must be explicitly set to exactly one of: yes, no.");
            }

            if (failures.length > 0) {
              core.setFailed(
                "Regulatory guardrails validation failed:\n- " + failures.join("\n- ")
              );
            } else {
              core.info("Regulatory guardrails validation passed.");
            }

  enforce-config-guardrails:
    name: Enforce Config Guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Static config guardrails
        run: node scripts/regulatory/check-config-guardrails.mjs

      - name: Work controls guardrails
        run: node scripts/regulatory/check-work-controls.mjs

      - name: Install CP API dependencies
        run: npm ci
        working-directory: control-plane/api

      - name: Run CP policy unit tests
        run: npx jest src/common/security/environment-policy.spec.ts --runInBand
        working-directory: control-plane/api

      - name: Install Orchestrator API dependencies
        run: npm ci
        working-directory: orchestrator/api

      - name: Run Orchestrator policy unit tests
        run: npx jest src/common/utils/environment-policy.spec.ts --runInBand
        working-directory: orchestrator/api
